services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: signalguard
      POSTGRES_USER: signalguard
      POSTGRES_PASSWORD: signalguard
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U signalguard -d signalguard"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 3s

  app:
    profiles: ["app"]
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      SIGNALGUARD_PROFILE: local
      SIGNALGUARD_HOST: 0.0.0.0
      SIGNALGUARD_PORT: "8080"
      SIGNALGUARD_DATABASE_URL: postgres://signalguard:signalguard@postgres:5432/signalguard
      SIGNALGUARD_REDIS_URL: redis://redis:6379
      SIGNALGUARD_INGESTION_MODE: replay
      SIGNALGUARD_INGESTION_REPLAY_PATH: examples/replay/sample.jsonl
      SIGNALGUARD_REPLAY_RESET_STORAGE: "true"
    ports:
      - "8080:8080"
